version: 2

orchestration_paths:
  - "codecgc/**"
  - ".claude/commands/**"
  - ".claude/settings.json"
  - ".mcp.json"
  - "model-routing.yaml"

docs_paths:
  - "README.md"
  - "INSTALLATION.md"
  - "docs/**"
  - "CHANGELOG.md"

frontend_paths:
  - "apps/web/**"
  - "src/components/**"
  - "src/pages/**"
  - "src/app/**"
  - "src/styles/**"
  - "web/**"
  - "frontend/**"

backend_paths:
  - "apps/api/**"
  - "server/**"
  - "src/server/**"
  - "src/services/**"
  - "src/repositories/**"
  - "backend/**"

test_paths:
  frontend:
    - "apps/web/*.test.*"
    - "apps/web/*.spec.*"
    - "apps/web/**/*.test.*"
    - "apps/web/**/*.spec.*"
    - "tests/frontend/**"
  backend:
    - "apps/api/*.test.*"
    - "apps/api/*.spec.*"
    - "apps/api/**/*.test.*"
    - "apps/api/**/*.spec.*"
    - "tests/backend/**"

shared_paths:
  - "packages/shared/**"
  - "src/shared/**"
  - "src/lib/**"
  - "src/types/**"

rules:
  claude_allowed_owners:
    - "orchestration"
    - "docs"
  backend_executor: "codexmcp"
  frontend_executor: "geminimcp"
  shared_policy: "split-first"
